name: Weekly PPP Refresh

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-ppp-refresh
  cancel-in-progress: false

jobs:
  refresh-ppp-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Refresh PPP snapshot
        run: |
          ppp-api-refresh \
            --skip-geoip \
            --ppp-output ./dynamic_ppp_api/data/ppp_snapshot.json

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- dynamic_ppp_api/data/ppp_snapshot.json; then
            echo "No PPP snapshot changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dynamic_ppp_api/data/ppp_snapshot.json
          git commit -m "Refresh PPP snapshot"
          git push origin HEAD:main
